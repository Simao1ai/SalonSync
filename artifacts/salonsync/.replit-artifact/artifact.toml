kind = "web"
previewPath = "/"
title = "SalonSync"
version = "1.0.0"
id = "artifacts/salonsync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24551
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/salonsync run dev"

[services.env]
PORT = "24551"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/salonsync", "run", "build"]
publicDir = "artifacts/salonsync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
